<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welding Shop - Production Control Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-color: #0f1115;
  --panel-bg: #161920;
  --panel-header: #1e222b;
  --text-main: #f1f2f6;
  --text-muted: #747d8c;
  --accent-neon: #00eaff;
  --accent-orange: #ff9f43;
  --accent-red: #ff4d4d;
  --accent-green: #2ecc71;
  --border: #262c38;
}
body { font-family:'Kanit',sans-serif; background-color:var(--bg-color); color:var(--text-main); margin:0; padding:25px; }
.header-title { text-align:center; margin-bottom:30px; }
.header-title h1 { margin:0; font-size:2rem; letter-spacing:1px; color:var(--text-main); text-transform:uppercase; }
.header-title h1 span { color:var(--accent-neon); }
.dashboard-grid { display:grid; grid-template-columns:320px 1fr; gap:25px; max-width:1600px; margin:0 auto; }
@media(max-width:1024px){ .dashboard-grid{grid-template-columns:1fr;} }
.panel { background-color:var(--panel-bg); border-radius:12px; border:1px solid var(--border); overflow:hidden; box-shadow:0 10px 25px rgba(0,0,0,0.4); }
.panel-header { background-color:var(--panel-header); padding:15px 20px; font-weight:600; font-size:1.05rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.panel-body { padding:20px; }
.input-group { margin-bottom:18px; }
label { display:block; font-size:0.85rem; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; font-weight:500; }
input,select { width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background-color:#1e222b; color:var(--text-main); font-family:'Kanit',sans-serif; font-size:1rem; box-sizing:border-box; transition:all .3s; -moz-appearance:textfield; }
input::-webkit-inner-spin-button, input::-webkit-outer-spin-button { -webkit-appearance:none; }
input:focus, select:focus { outline:none; border-color:var(--accent-neon); box-shadow:0 0 10px rgba(0,234,255,0.2); }
.divider { height:1px; background-color:var(--border); margin:20px 0; }
.ratio-sum-bar { display:flex; justify-content:space-between; align-items:center; background:#1e222b; border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-size:0.9rem; margin-bottom:18px; }
.ratio-sum-bar .label { color:var(--text-muted); }
.ratio-sum-bar .val { font-weight:600; font-size:1rem; }
.ratio-ok  { color:var(--accent-green); }
.ratio-warn{ color:var(--accent-red); }
.btn-calc { width:100%; padding:15px; background-color:var(--accent-red); color:white; border:none; border-radius:8px; font-size:1.1rem; font-weight:600; font-family:'Kanit',sans-serif; cursor:pointer; transition:all .3s; box-shadow:0 4px 15px rgba(255,77,77,0.3); text-transform:uppercase; letter-spacing:1px; }
.btn-calc:hover { background-color:#ff3333; box-shadow:0 6px 20px rgba(255,77,77,0.5); transform:translateY(-2px); }
.btn-calc:active { transform:translateY(0); }
.results-container { display:flex; flex-direction:column; gap:25px; }
table { width:100%; border-collapse:collapse; text-align:center; }
th { background-color:var(--panel-header); color:var(--text-muted); font-weight:500; font-size:0.85rem; padding:12px; border-bottom:2px solid var(--border); white-space:nowrap; }
td { padding:13px 12px; border-bottom:1px solid var(--border); font-size:0.95rem; }
.highlight-neon   { color:var(--accent-neon);  font-weight:600; }
.highlight-orange { color:var(--accent-orange); font-weight:600; }
.highlight-blue   { color:#54a0ff; font-weight:600; }
.highlight-green  { color:var(--accent-green);  font-weight:600; }
.ccab-col { color:#a78bfa; font-weight:500; }
.dcab-col { color:#38bdf8; font-weight:500; }
.suv-col  { color:#fb923c; font-weight:500; }
.d500-col { color:#f472b6; font-weight:500; }
.total-row td { background-color:#1e222b; border-top:2px solid var(--border); border-bottom:2px solid var(--border); color:#fff; font-weight:600; }
.total-target-row td { background-color:#162214; border-bottom:2px solid #2ecc7140; color:#fff; font-weight:600; }
.ot-sep-row td { background:#0f1115; padding:6px 12px 6px 20px; font-size:0.78rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; border-bottom:none; text-align:left; }
.ot-data-row td { background:rgba(20,23,35,0.5); }
/* expand */
.detail-btn { display:inline-flex; align-items:center; gap:5px; background:none; border:1px solid #2a3550; border-radius:5px; color:var(--accent-neon); font-family:'Kanit',sans-serif; font-size:0.75rem; padding:4px 10px; cursor:pointer; transition:background .15s,border-color .15s; white-space:nowrap; }
.detail-btn:hover { background:rgba(0,234,255,0.08); border-color:var(--accent-neon); }
.detail-btn .arr { display:inline-block; transition:transform .2s; font-size:.7rem; }
.detail-btn.open .arr { transform:rotate(90deg); }
.detail-tr td { padding:0 !important; border-bottom:1px solid var(--border) !important; }
.detail-inner { overflow:hidden; max-height:0; transition:max-height .3s ease; background:#0f1115; }
.detail-inner.open { max-height:400px; }
.detail-table { background:#0f1115; }
.detail-table th { font-size:0.78rem; padding:9px 14px; background:#13161e; color:var(--text-muted); border-bottom:1px solid var(--border); }
.detail-table th:first-child { text-align:left; padding-left:32px; }
.detail-table td { padding:9px 14px; font-size:0.88rem; border-bottom:1px solid #1a1d27; background:#0f1115; color:var(--text-muted); }
.detail-table td:first-child { text-align:left; padding-left:32px; }
.detail-table tr:last-child td { background:#13161e; color:var(--text-main); font-weight:600; border-bottom:none; }
</style>
</head>
<body>

<div class="header-title">
  <h1>Welding Shop <span>Production Control Center</span></h1>
</div>

<div class="dashboard-grid">

  <!-- LEFT -->
  <div class="panel">
    <div class="panel-header">⚙️ DATA PARAMETERS</div>
    <div class="panel-body">
      <div class="input-group">
        <label>Main Takt Time (วินาที)</label>
        <input type="number" id="mainTT" value="81">
      </div>
      <div class="input-group">
        <label>เงื่อนไขเวลาทำงาน (OT)</label>
        <select id="otType">
          <option value="0">ไม่มี OT (8 ชั่วโมง)</option>
          <option value="0.5">มี OT 0.5 ชั่วโมง</option>
          <option value="1.0">มี OT 1.0 ชั่วโมง</option>
          <option value="1.5">มี OT 1.5 ชั่วโมง</option>
          <option value="2.0">มี OT 2.0 ชั่วโมง</option>
        </select>
      </div>
      <div class="divider"></div>
      <label style="color:var(--accent-neon);margin-bottom:15px;display:block;">MODEL RATIO SETTING (%)</label>
      <div class="input-group"><label>C-CAB Ratio (%)</label><input type="number" step="0.1" id="ratioC" value="11.1"></div>
      <div class="input-group"><label>D-CAB Ratio (%)</label><input type="number" step="0.1" id="ratioD" value="57.5"></div>
      <div class="input-group"><label>SUV Ratio (%)</label>  <input type="number" step="0.1" id="ratioSUV" value="8.4"></div>
      <div class="input-group"><label>500D Ratio (%)</label> <input type="number" step="0.1" id="ratio500D" value="23.0"></div>
      <div class="ratio-sum-bar">
        <span class="label">รวม Ratio ทั้งหมด</span>
        <span class="val" id="ratioSum">—</span>
      </div>
      <button class="btn-calc" onclick="calculateAll()">⚙️ Calculate Now</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="results-container">

    <!-- HOURLY TABLE -->
    <div class="panel">
      <div class="panel-header">
        📊 HOURLY PRODUCTION BREAKDOWN
        <span style="font-size:.8rem;font-weight:400;color:var(--text-muted);">
          — Target 97% คำนวณจาก Total Plan รวม &nbsp;|&nbsp; กด ▶ เพื่อดู Model Breakdown
        </span>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>ชั่วโมงที่</th>
              <th>Plan (คัน)</th>
              <th>รายละเอียด Model</th>
            </tr>
          </thead>
          <tbody id="hourlyBody"></tbody>
        </table>
      </div>
    </div>

    <!-- PROCESS TAKT TIME -->
    <div class="panel">
      <div class="panel-header">⏱️ PROCESS TAKT TIME CALCULATION</div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th style="text-align:left;padding-left:20px;">Process</th>
              <th>Ratio รวม (%)</th>
              <th>สูตร</th>
              <th>Takt Time (วินาที)</th>
            </tr>
          </thead>
          <tbody id="processBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
const BASE_HOURS = [44,45,37,45,44,45,37,44];
const OT_MAP = { "0.5":[22], "1.0":[45], "1.5":[45,22], "2.0":[45,44] };
const MODELS = [
  {key:"C", label:"C-CAB", cls:"ccab-col"},
  {key:"D", label:"D-CAB", cls:"dcab-col"},
  {key:"S", label:"SUV",   cls:"suv-col"},
  {key:"5", label:"500D",  cls:"d500-col"},
];
const PROCESSES = [
  {name:"C-CAB",                 keys:["C"]},
  {name:"D-CAB",                 keys:["D"]},
  {name:"SUV",                   keys:["S"]},
  {name:"500D",                  keys:["5"]},
  {name:"C-CAB + D-CAB",        keys:["C","D"]},
  {name:"D-CAB + SUV",          keys:["D","S"]},
  {name:"SUV + 500D",           keys:["S","5"]},
  {name:"COMMON (C+D+SUV+500D)",keys:["C","D","S","5"]},
];

let dc = 0;

function getRatios() {
  return {
    C:   parseFloat(document.getElementById("ratioC").value)    || 0,
    D:   parseFloat(document.getElementById("ratioD").value)    || 0,
    S:   parseFloat(document.getElementById("ratioSUV").value)  || 0,
    "5": parseFloat(document.getElementById("ratio500D").value) || 0,
  };
}
function getMainTT() { return parseFloat(document.getElementById("mainTT").value) || 0; }

// แจกจ่ายรุ่น: floor 3 รุ่นแรก, รุ่นสุดท้ายรับส่วนที่เหลือ → รวม = vol เสมอ
function distributeModels(vol, ratios) {
  const total = ratios.C + ratios.D + ratios.S + ratios["5"];
  if (total <= 0) return {C:0,D:0,S:0,"5":0};
  let res = {}, used = 0;
  MODELS.slice(0,-1).forEach(m => {
    res[m.key] = Math.floor(vol * (ratios[m.key] / total));
    used += res[m.key];
  });
  res[MODELS[MODELS.length-1].key] = vol - used;
  return res;
}

function toggle(uid, btn) {
  const el = document.getElementById(uid);
  const open = el.classList.toggle("open");
  btn.classList.toggle("open", open);
}

function buildHourRow(hrLabel, vol, isOT, ratios) {
  dc++;
  const uid = "det" + dc;
  const dist = distributeModels(vol, ratios);
  const rTotal = ratios.C + ratios.D + ratios.S + ratios["5"];

  let dRows = "";
  MODELS.forEach(m => {
    const pct = rTotal > 0 ? ((ratios[m.key] / rTotal) * 100).toFixed(1) : "0.0";
    dRows += `<tr>
      <td>${m.label}</td>
      <td class="${m.cls}">${dist[m.key]}</td>
      <td style="color:var(--text-muted)">${pct}%</td>
    </tr>`;
  });
  dRows += `<tr><td>รวม</td><td>${vol}</td><td>100%</td></tr>`;

  const trClass = isOT ? ' class="ot-data-row"' : '';
  const otBadge = isOT
    ? `<span style="font-size:.72rem;background:#2a2e3f;color:var(--text-muted);padding:2px 6px;border-radius:3px;margin-left:5px;">OT</span>`
    : '';

  return `<tr${trClass}>
    <td>ชั่วโมงที่ ${hrLabel}${otBadge}</td>
    <td class="highlight-blue">${vol}</td>
    <td><button class="detail-btn" onclick="toggle('${uid}',this)"><span class="arr">&#9654;</span> Detail</button></td>
  </tr>
  <tr class="detail-tr">
    <td colspan="3">
      <div class="detail-inner" id="${uid}">
        <table class="detail-table">
          <thead><tr><th>Model</th><th>จำนวน (คัน)</th><th>Ratio</th></tr></thead>
          <tbody>${dRows}</tbody>
        </table>
      </div>
    </td>
  </tr>`;
}

function calculateAll() {
  const mainTT = getMainTT();
  const ratios = getRatios();
  const otType = document.getElementById("otType").value;
  const otExtra = OT_MAP[otType] || [];

  // ratio sum indicator
  const rSum = ratios.C + ratios.D + ratios.S + ratios["5"];
  const sumEl = document.getElementById("ratioSum");
  sumEl.textContent = rSum.toFixed(1) + "%";
  sumEl.className = "val " + (Math.abs(rSum - 100) < 0.05 ? "ratio-ok" : "ratio-warn");

  dc = 0;
  let html = "";
  let totPlan8 = BASE_HOURS.reduce((a,b) => a+b, 0);

  // ── 8 ชั่วโมงปกติ ──
  BASE_HOURS.forEach((vol, i) => {
    html += buildHourRow(i + 1, vol, false, ratios);
  });

  // Target 97% ของ 8h คำนวณครั้งเดียวจาก Total
  const tgt8 = Math.round(totPlan8 * 0.97);
  html += `<tr class="total-row">
    <td>TOTAL (8 ชั่วโมง)</td>
    <td class="highlight-blue">${totPlan8}</td>
    <td></td>
  </tr>
  <tr class="total-target-row">
    <td style="color:var(--accent-green)">TARGET 97.0%</td>
    <td class="highlight-green">${tgt8} คัน</td>
    <td style="font-size:.8rem;color:var(--text-muted);">${totPlan8} × 0.97 = ${(totPlan8*0.97).toFixed(2)} → Round = ${tgt8}</td>
  </tr>`;

  // ── OT hours ──
  if (otExtra.length > 0) {
    const otLabel = {"0.5":"OT 0.5h","1.0":"OT 1.0h","1.5":"OT 1.5h","2.0":"OT 2.0h"}[otType];
    const otSum = otExtra.reduce((a,b) => a+b, 0);
    const totPlanOT = totPlan8 + otSum;
    const tgtOT = Math.round(totPlanOT * 0.97);

    html += `<tr class="ot-sep-row"><td colspan="3">─── ${otLabel} ───────────────────</td></tr>`;
    otExtra.forEach((vol, i) => {
      html += buildHourRow(9 + i, vol, true, ratios);
    });

    html += `<tr class="total-row">
      <td>TOTAL (รวม ${otLabel})</td>
      <td class="highlight-blue">${totPlanOT}</td>
      <td></td>
    </tr>
    <tr class="total-target-row">
      <td style="color:var(--accent-green)">TARGET 97.0%</td>
      <td class="highlight-green">${tgtOT} คัน</td>
      <td style="font-size:.8rem;color:var(--text-muted);">${totPlanOT} × 0.97 = ${(totPlanOT*0.97).toFixed(2)} → Round = ${tgtOT}</td>
    </tr>`;
  }

  document.getElementById("hourlyBody").innerHTML = html;

  // ── Process Takt Time ──
  let procHtml = "";
  PROCESSES.forEach(p => {
    const ps  = p.keys.reduce((a,k) => a + (ratios[k] || 0), 0);
    const pTT = ps > 0 ? Math.floor(mainTT / (ps / 100)) : "—";
    procHtml += `<tr>
      <td style="text-align:left;padding-left:20px;font-weight:500;">${p.name}</td>
      <td>${ps.toFixed(1)}%</td>
      <td style="font-size:.8rem;color:var(--text-muted);">${mainTT} ÷ (${ps.toFixed(1)} ÷ 100)</td>
      <td class="highlight-neon">${pTT}</td>
    </tr>`;
  });
  document.getElementById("processBody").innerHTML = procHtml;
}

document.querySelectorAll("input,select").forEach(el => el.addEventListener("input", calculateAll));
window.onload = calculateAll;
</script>
</body>
</html>
