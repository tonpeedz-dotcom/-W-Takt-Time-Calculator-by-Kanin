<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Problem Register</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            /* ปรับสีพื้นหลังและตัวอักษรตามโหมด Dark/Light ของ Telegram */
            background-color: var(--tg-theme-bg-color, #ffffff); 
            color: var(--tg-theme-text-color, #000000); 
        }
        label { font-weight: bold; font-size: 14px; }
        input, select, textarea { 
            width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 20px; 
            box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc;
            font-family: inherit;
        }
        button { 
            width: 100%; padding: 15px; 
            background-color: var(--tg-theme-button-color, #2481cc); 
            color: var(--tg-theme-button-text-color, #ffffff); 
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer;
        }
        button:disabled { background-color: #888; }
    </style>
</head>
<body>
    <h2>📝 แจ้งปัญหา (ISSUE)</h2>
    <form id="issueForm">
        <label>ประเภทปัญหา (Problem Type):</label>
        <select id="problem_type" required>
            <option value="Machine">Machine</option>
            <option value="Quality">Quality</option>
            <option value="Tooling">Tooling</option>
            <option value="Process">Process</option>
        </select>

        <label>กลุ่ม/ไลน์ผลิต (Kumi):</label>
        <input type="text" id="kumi" placeholder="เช่น Mainbody Tack St.3" required>

        <label>รายละเอียดปัญหา:</label>
        <textarea id="problem_detail" rows="4" placeholder="อธิบายปัญหาที่พบ..." required></textarea>

        <label>📸 แนบรูปภาพปัญหา:</label>
        <input type="file" id="problem_pic" accept="image/*" capture="environment" required>

        <button type="submit" id="submitBtn">Submit Problem</button>
    </form>

    <script>
        // 1. ใส่กุญแจ Supabase
        const SUPABASE_URL = 'https://emfpcaycplfuyucwhvey.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable__yfQFn03EJC-LvA_cdqf8Q_Yqg4c2U7'; 
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. ตั้งค่า Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // สั่งให้หน้าต่างเด้งเต็มจอ

        // ดึงชื่อ Telegram ของคนแจ้งอัตโนมัติ
        const issuerName = tg.initDataUnsafe?.user?.first_name || 'Unknown Issuer';

        document.getElementById('issueForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'กำลังอัปโหลดข้อมูล... ⏳';
            btn.disabled = true;

            try {
                // 3. จัดการอัปโหลดรูปภาพเข้า ถัง problem_pictures
                const fileInput = document.getElementById('problem_pic');
                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('problem_pictures')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // ดึงลิงก์รูปภาพ (Public URL)
                const { data: publicUrlData } = supabase.storage
                    .from('problem_pictures')
                    .getPublicUrl(fileName);
                const imageUrl = publicUrlData.publicUrl;

                // 4. บันทึกข้อมูลลง Database ตาราง quality_problems
                const { error: insertError } = await supabase
                    .from('quality_problems')
                    .insert([{
                        problem_type: document.getElementById('problem_type').value,
                        issuer: issuerName,
                        kumi: document.getElementById('kumi').value,
                        problem_detail: document.getElementById('problem_detail').value,
                        problem_pic_url: imageUrl,
                        status: 'ISSUE'
                    }]);

                if (insertError) throw insertError;

                // เสร็จสิ้น แจ้งเตือนแล้วปิด Mini App
                tg.showAlert('บันทึกข้อมูลเรียบร้อยแล้ว!');
                tg.close();

            } catch (error) {
                alert('เกิดข้อผิดพลาด: ' + error.message);
                btn.innerText = 'Submit Problem';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
